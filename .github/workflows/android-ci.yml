name: Android CI

on:
    pull_request:
        branches: [ main ]

jobs:
    build:

        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup JDK
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17
                  cache: gradle

            - name: Grant permission
              run: chmod +x gradlew

            - name: Ktlint
              run: ./gradlew ktlintCheck

            - name: Build
              run: ./gradlew build
